appId: com.grw.modbus-storm
productName: Modbus Storm
copyright: Copyright © 2026 Modbus Storm contributors

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - "!**/*.map"

extraMetadata:
  main: out/main/index.js

# Artifact filename template — includes arch so arm64/x64 DMGs are clearly named
artifactName: "${productName}-${version}-${arch}.${ext}"

# ── macOS ────────────────────────────────────────────────────────────────────
# Arch is passed via CLI (--arch arm64 or --arch x64) from the CI matrix.
# Each runner (macos-latest = arm64, macos-13 = x64) builds natively so that
# serialport and other native modules link against the correct architecture.
mac:
  target:
    - target: dmg
    - target: zip
  icon: resources/icons/icon.icns
  category: public.app-category.developer-tools
  # hardenedRuntime + entitlements required for notarization (optional)
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

dmg:
  sign: false   # set to true when notarization credentials are configured

# ── Windows ──────────────────────────────────────────────────────────────────
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icons/icon.ico

# ── Linux ────────────────────────────────────────────────────────────────────
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  icon: resources/icons/
  category: Development

# ── Publishing ───────────────────────────────────────────────────────────────
publish:
  provider: github
  releaseType: draft