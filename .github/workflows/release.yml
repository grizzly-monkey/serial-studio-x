name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (M1/M2/M3/M4) — arm64
          - name: macOS Apple Silicon
            os: macos-latest
            build_cmd: --mac --arm64
            platform: mac

          # macOS Intel — x86_64
          - name: macOS Intel
            os: macos-13
            build_cmd: --mac --x64
            platform: mac

          # Windows x64
          - name: Windows x64
            os: windows-latest
            build_cmd: --win --x64
            platform: win

          # Linux x64
          - name: Linux x64
            os: ubuntu-latest
            build_cmd: --linux --x64
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libudev-dev libusb-1.0-0-dev rpm fakeroot dpkg

      - name: Set up Python (Windows)
        if: matrix.platform == 'win'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package and publish
        run: npx electron-builder ${{ matrix.build_cmd }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment and configure the secrets below to enable macOS code signing + notarization:
          # CSC_LINK: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
