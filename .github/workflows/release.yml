name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Step 1: Create the GitHub Release (draft) before any build job starts.
  # This eliminates the race condition where all 4 platform jobs try to create
  # the same release simultaneously and all but one fail with a 422 conflict.
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for --generate-notes commit history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # Skip creation if the release already exists (idempotent on re-runs)
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $TAG already exists — skipping creation"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Serial Studio X $TAG" \
              --draft \
              --generate-notes
          fi

  # ── Step 2: Build and upload binaries on each platform.
  build:
    name: Build — ${{ matrix.name }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (M1/M2/M3/M4) — arm64
          - name: macOS Apple Silicon
            os: macos-latest
            build_cmd: --mac --arm64
            platform: mac

          # macOS Intel — x86_64 (macos-13 is the last Intel GitHub runner)
#          - name: macOS Intel
#            os: macos-13
#            build_cmd: --mac --x64
#            platform: mac

          # Windows x64
          - name: Windows x64
            os: windows-latest
            build_cmd: --win --x64
            platform: win

          # Linux x64
          - name: Linux x64
            os: ubuntu-latest
            build_cmd: --linux --x64
            platform: linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libudev-dev libusb-1.0-0-dev rpm fakeroot dpkg

      - name: Set up Python (Windows)
        if: matrix.platform == 'win'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Set version from git tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      - name: Build app
        run: npm run build

      - name: Package and upload to release
        run: npx electron-builder ${{ matrix.build_cmd }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment to enable macOS code signing + notarization:
          # CSC_LINK: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          # CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  # ── Step 3: All builds done — publish the draft release.
  finalize-release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          IS_DRAFT=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' 2>/dev/null || echo "false")
          if [ "$IS_DRAFT" = "true" ]; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --draft=false
          else
            echo "Release $TAG is already published or does not exist — nothing to do"
          fi
